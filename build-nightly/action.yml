---
name: "Build pinned Yazi nightly"
description: >-
  Issue:

  Yazi only ever publishes nightly under a single moving `nightly` tag whose old assets are deleted,
  so it can't be pinned by tag.

  Solution:

  Build a specific Yazi commit from source (cached by commit) so the nightly version is locked and
  cannot drift between CI runs. Renovate can be used to bump the nightly commit in a controlled
  manner, allowing for reproducible builds.

  Produces the `yazi` and `ya` executables and adds them to the `PATH` for subsequent steps in the
  workflow.

inputs:
  commit:
    description: "The https://github.com/sxyazi/yazi/ commit (on the main branch) to build."
    required: true

runs:
  using: composite
  steps:
    - name: Install the mold linker
      uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

    - name: Compile and install `yazi-fm` from source (cached)
      uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
      with:
        # The called action caches the compilation of yazi internally.
        #
        # Due to Cargo's limitations, the `yazi-fm` and `yazi-cli` crates on
        # crates.io must be built with `cargo install --force yazi-build`
        # https://github.com/sxyazi/yazi/blob/2ec3a6c645324295331c0f2ef6d4d946cf11c06b/yazi-fm/build.rs?plain=1#L23-L25
        crate: yazi-build
        git: https://github.com/sxyazi/yazi
        commit: ${{ inputs.commit }}
        # tag: ${{ matrix.yazi-version.tag }}
