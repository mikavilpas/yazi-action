---
name: CI checks
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # renovate: datasource=git-refs packageName=https://github.com/sxyazi/yazi
  YAZI_NIGHTLY_COMMIT: 60d94608cb050f68c5ce85b7e236f0e5b121538d

jobs:
  build-nightly:
    name: Build pinned Yazi and Ya nightly (${{ matrix.runner }})
    strategy:
      # the yazi build is a ~5min operation. If some check fails after the
      # build, we don't want to waste time rebuilding it just to fix the
      # checks.
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build pinned Yazi nightly
        uses: ./build-nightly
        id: build
        with:
          commit: ${{ env.YAZI_NIGHTLY_COMMIT }}
      - name: Verify Yazi and Ya are available
        run: |
          which yazi || {
            echo "yazi not found in PATH"
            exit 1
          }
          which ya || {
            echo "ya not found in PATH"
            exit 1
          }
          yazi --version
          ya --version

          # Yazi embeds the 7-character git short hash in `--version`
          # (e.g. "Version: 26.5.6 (21550a7 2026-06-30)"), so match 7 chars.
          short="$(printf '%s' "${{ env.YAZI_NIGHTLY_COMMIT }}" | cut -c1-7)"
          yazi --version | grep "$short"
          ya --version | grep "$short"

  restore-nightly:
    name: Restore pinned Yazi and Ya nightly (${{ matrix.runner }})
    needs: build-nightly
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Restore pinned Yazi nightly
        uses: ./restore-nightly
        id: restore
        with:
          commit: ${{ env.YAZI_NIGHTLY_COMMIT }}
      - name: Verify the restored Yazi and Ya are available without rebuilding
        run: |
          # This job has no Rust/cargo build step, so if `yazi` and `ya` work
          # here they can only have come from the restored artifact.
          which yazi || {
            echo "yazi not found in PATH"
            exit 1
          }
          which ya || {
            echo "ya not found in PATH"
            exit 1
          }
          yazi --version
          ya --version

          # Yazi embeds the 7-character git short hash in `--version`
          # (e.g. "Version: 26.5.6 (21550a7 2026-06-30)"), so match 7 chars.
          short="$(printf '%s' "${{ env.YAZI_NIGHTLY_COMMIT }}" | cut -c1-7)"
          yazi --version | grep "$short"
          ya --version | grep "$short"

  build-honors-pinned-commit:
    # Regression test for the bug where `build-nightly` ignored the pinned
    # commit and built the latest `main` instead: `yazi-build`'s build.rs
    # clones `main` and never applies the requested rev. It would then fail in
    # a version sanity check, blocking the build until the cache was manually
    # revoked.
    name: Regression - honors the pinned commit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Resolve the parent of the pinned nightly commit
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # sxyazi/yazi is a public repo; the token only avoids rate limits.
          parent="$(gh api "repos/sxyazi/yazi/commits/${YAZI_NIGHTLY_COMMIT}" --jq '.parents[0].sha')"
          echo "Resolved parent of $YAZI_NIGHTLY_COMMIT -> $parent"
          echo "commit=$parent" >> "$GITHUB_OUTPUT"
      - name: Build the pinned parent Yazi nightly
        uses: ./build-nightly
        with:
          commit: ${{ steps.resolve.outputs.commit }}
          # Distinct name so this artifact does not clash with `build-nightly`.
          artifact-name: yazi-nightly-regression
      - name: Assert the built Yazi reports the pinned parent commit
        env:
          RESOLVED_COMMIT: ${{ steps.resolve.outputs.commit }}
        run: |
          short="$(printf '%s' "$RESOLVED_COMMIT" | cut -c1-7)"
          yazi --version
          ya --version
          yazi --version | grep --quiet "$short" || {
            echo "REGRESSION: built Yazi reports a different commit than the pinned $RESOLVED_COMMIT (looked for $short)."
            exit 1
          }
          ya --version | grep --quiet "$short" || {
            echo "REGRESSION: built Ya reports a different commit than the pinned $RESOLVED_COMMIT (looked for $short)."
            exit 1
          }

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - build-nightly
      - restore-nightly
      - build-honors-pinned-commit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1
