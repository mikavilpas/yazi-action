---
name: CI checks
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/sxyazi/yazi
  YAZI_NIGHTLY_COMMIT: 21550a7eb5086ba34f8eabf8aaab85f601d34a74

jobs:
  build-nightly:
    name: Build pinned Yazi and Ya nightly (${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build pinned Yazi nightly
        uses: ./build-nightly
        id: build
        with:
          commit: ${{ env.YAZI_NIGHTLY_COMMIT }}
      - name: Verify Yazi and Ya are available
        run: |
          which yazi || {
            echo "yazi not found in PATH"
            exit 1
          }
          which ya || {
            echo "ya not found in PATH"
            exit 1
          }
          yazi --version
          ya --version

          # Yazi embeds the 7-character git short hash in `--version`
          # (e.g. "Version: 26.5.6 (21550a7 2026-06-30)"), so match 7 chars.
          short="$(printf '%s' "${{ env.YAZI_NIGHTLY_COMMIT }}" | cut -c1-7)"
          yazi --version | grep "$short"
          ya --version | grep "$short"

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - build-nightly
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1
